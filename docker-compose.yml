# AgriGrant AI — backend stack
# Usage:
#   1. cp backend/.env.example backend/.env  (and fill in real secrets)
#   2. docker compose up --build
#
# Secrets are loaded from backend/.env at runtime — they are NEVER baked
# into the image (see backend/.dockerignore).
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: agrigrant-backend:latest
    container_name: agrigrant-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8000"
      PYTHONUNBUFFERED: "1"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - agrigrant
    # SSE keep-alive friendly — don't kill the container on long-lived streams
    stop_grace_period: 30s

  # Optional: ngrok tunnel so Maestro (UiPath cloud) can hit your local backend.
  # Enable with:  docker compose --profile tunnel up
  ngrok:
    image: ngrok/ngrok:latest
    container_name: agrigrant-ngrok
    profiles: ["tunnel"]
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: ["http", "backend:8000", "--log", "stdout"]
    ports:
      - "4040:4040"   # ngrok inspector UI
    networks:
      - agrigrant

networks:
  agrigrant:
    driver: bridge
