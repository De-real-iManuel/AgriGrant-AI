<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject | default("AgriGrant AI") }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f7f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1f3329;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f4f7f5;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);max-width:600px;width:100%;">

        <tr><td style="background:linear-gradient(135deg,#2d8659 0%,#1f5e3f 100%);padding:32px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr>
            <td>
              <div style="font-size:13px;font-weight:600;color:#a8e6c1;letter-spacing:1.5px;text-transform:uppercase;">AgriGrant AI</div>
              <div style="font-size:24px;font-weight:700;color:#ffffff;margin-top:6px;">{{ title | default("Notification") }}</div>
            </td>
            <td align="right" style="vertical-align:top;"><span style="font-size:32px;">🌾</span></td>
          </tr></table>
        </td></tr>

        <tr><td style="padding:32px;font-size:15px;line-height:1.65;color:#1f3329;">
          {% block content %}{% endblock %}
        </td></tr>

        <tr><td style="background:#fafbfa;padding:24px 32px;border-top:1px solid #e7ecea;">
          <p style="margin:0 0 8px;font-size:13px;color:#5a6b62;">You're receiving this because you submitted an application through AgriGrant AI.</p>
          <p style="margin:0;font-size:12px;color:#8a9890;">
            <a href="https://agrigrant.xyz" style="color:#2d8659;text-decoration:none;">agrigrant.xyz</a>
            &nbsp;·&nbsp; <a href="mailto:info@agrigrant.xyz" style="color:#2d8659;text-decoration:none;">info@agrigrant.xyz</a>
            &nbsp;·&nbsp; © {{ year | default(2026) }} AgriGrant AI
          </p>
        </td></tr>

      </table>
      <p style="font-size:11px;color:#a0b0a8;margin:16px 0 0;">AgriGrant AI · Lagos, Nigeria</p>
    </td></tr>
  </table>
</body>
</html>
